<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name">

      <label for="email">Email: </label>
      <input type="email" id="email">

      <label for="position">Select A Job Position</label>
      <select id="position">
        <option value="">Please select</option>
        <option value="frontend">Frontend Developer</option>
        <option value="backend">Backend Developer</option>
        <option value="designer">Ui/Ux Designer</option>
        <option value="manager">Product Manager</option>
      </select>

      <fieldset class="radio-group">
        <legend>Availability Options</legend>
        <input type="radio" id="full-time" name="availability" value="full-time">
        <label for="full-time">Full-time</label>
        <input type="radio" id="part-time" name="availability" value="part-time">
        <label for="part-time">Part-time</label>
      </fieldset>

      <div class="form-group">
        <label for="message">Message: </label>
        <textarea name="message" id="message" rows="5" placeholder="Enter-your-message-here..."></textarea>
      </div>

      <button type="submit">Application</button>
    </form>
  </div>
</body>
</html>
