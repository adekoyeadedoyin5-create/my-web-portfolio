<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hand">
        <div class="card black">
            <div class="rank">A<br>♠</div>
            <div class="suit-center">♠</div>
            <div class="rank bottom-rank">A<br>♠</div>
        </div>

        <div class="card red">
            <div class="rank">K<br>♥</div>
            <div class="suit-center">♥</div>
            <div class="rank bottom-rank">K<br>♥</div>
        </div>

        <div class="card red">
            <div class="rank">J<br>♦</div>
            <div class="suit-center">♦</div>
            <div class="rank bottom-rank">J<br>♦</div>
        </div>
    </div>

</body>
</html>
