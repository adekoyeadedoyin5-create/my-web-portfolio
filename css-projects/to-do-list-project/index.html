<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link  rel="stylesheet" href="styles.css">
</head>

<body>
<ul class="todo-list">
    <li>
    <input type="checkbox" id="task1">
    <label for="task1">First Task</label>
    <ul class="sub-item">
        <li>
            <a class="sub-item-link" href="https://code.visualstudio.com/" target="_blank">Visit Vs Code</a>
        </li>
        </ul>
</li>
<li>
    <input type="checkbox" id="task2">
    <label for="task2">Second task Task</label>
    <ul class="sub-item">
        <li>
            <a class="sub-item-link" href="https://www.google.com/" target="_blank">Visit Google</a>
        </li>
        </ul>
</li>
<li>
    <input type="checkbox" id="task3">
    <label for="task3">Third Task</label>
     <ul class="sub-item">
        <li>
            <a class="sub-item-link" href="https://www.threads.com/?hl=en" target="_blank">Visit Threads</a>
        </li>
        </ul>
</li>
<li>
    <input type="checkbox" id="task4">
    <label for="task4">Forth Task</label>
     <ul class="sub-item">
        <li>
            <a class="sub-item-link" href="https://github.com/" target="_blank">Visit GitHub</a>
        </li>
        </ul>
</li>
</ul>
</body>

</html
